<section class="section projects">
  <div class="container fx-fade-in">
    <h2 class="fx-fade-up">Featured Projects</h2>

    <div class="projects-grid">
      <div class="project-card fx-scale-in" *ngFor="let project of projects">
        <div class="project-image">
          <img [src]="project.image" [alt]="project.title" />
          <div class="overlay">
            <a [href]="project.github" target="_blank" class="project-link">View Code</a>
            <a *ngIf="project.liveDemo" [href]="project.liveDemo" target="_blank" class="project-link">Live Demo</a>
          </div>
        </div>

        <div class="project-content">
          <h3>{{ project.title }}</h3>
          <p>{{ project.shortDescription }}</p>

          <div class="technologies">
            <span *ngFor="let tech of project.technologies" class="tech-badge">
              {{ tech }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
