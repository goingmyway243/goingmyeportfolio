<section class="section contact">
  <div class="container fx-fade-in">
    <h2 class="fx-fade-up">Get In Touch</h2>

    <div class="contact-content">
      <div class="contact-info fx-fade-up fx-delay-1">
        <h3>Let's Connect</h3>
        <p>{{ contactInfo.availability }}</p>

        <div class="info-items">
          <div class="info-item">
            <span class="label">Email:</span>
            <a [href]="'mailto:' + contactInfo.email">{{ contactInfo.email }}</a>
          </div>
          <div class="info-item">
            <span class="label">Phone:</span>
            <a [href]="'tel:' + contactInfo.phone">{{ contactInfo.phone }}</a>
          </div>
          <div class="info-item">
            <span class="label">Location:</span>
            <span>{{ contactInfo.location }}</span>
          </div>
          <div class="info-item">
            <span class="label">Response Time:</span>
            <span>{{ contactInfo.responseTime }}</span>
          </div>
        </div>

        <div class="social-links">
          <h4>Follow Me</h4>
          <div class="social-icons">
            <a [href]="socialLinks.github" target="_blank" rel="noopener">GitHub</a>
            <a [href]="socialLinks.linkedin" target="_blank" rel="noopener">LinkedIn</a>
            <a [href]="socialLinks.email">Email</a>
          </div>
        </div>
      </div>

      <form class="contact-form fx-scale-in fx-delay-2">
        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" placeholder="Your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" placeholder="your.email@example.com" required />
        </div>

        <div class="form-group">
          <label for="subject">Subject *</label>
          <input type="text" id="subject" placeholder="Project inquiry?" required />
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" placeholder="Tell me about your project..." rows="5" required></textarea>
        </div>

        <button type="submit" class="button-primary">Send Message</button>
      </form>
    </div>
  </div>
</section>
