<!-- Global background -->
<div class="page-bg" aria-hidden="true">
  <div class="page-blob page-blob--1"></div>
  <div class="page-blob page-blob--2"></div>
  <div class="page-blob page-blob--3"></div>
  <div class="page-gradient"></div>
</div>

<!-- Dot Navigation -->
<nav class="dot-nav" aria-label="Section navigation">
  @for (section of sections; track section.id) {
    <button
      class="dot-nav__item"
      [class.active]="activeSection() === section.id"
      (click)="scrollToSection($event, section.id)"
      [attr.aria-label]="section.label"
      [attr.title]="section.label"
    >
      <span class="dot-nav__label">{{ section.label }}</span>
      <span class="dot-nav__dot"></span>
    </button>
  }
</nav>

<main class="main-content">
  <app-hero id="hero"></app-hero>
  <app-about id="about"></app-about>
  <app-projects id="projects"></app-projects>
  <app-skills id="skills"></app-skills>
  <app-contact id="contact"></app-contact>
</main>

<footer class="footer">
  <div class="container">
    <p>&copy; 2026 Light - Nguyen Hai Dang. Built with Angular & Liquid Glass design.</p>
    <div class="footer-links">
      <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:your.email@example.com">Email</a>
    </div>
  </div>
</footer>
